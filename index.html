<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Accountancy Quiz</title>
  <style>
    :root {
      --bg: #ffffff;
      --card: #ffffff;
      --text: #000000;
      --muted: #666666;
      --accent: #000000;
      --accent-invert: #ffffff;
      --good: #000000;
      --bad: #666666;
      --border: #000000;
      --border-light: #e0e0e0;
      --shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
      --radius: 0px; /* Sharp corners fit monochrome aesthetics well, change to 14px if you prefer rounded */
      --ring: 0 0 0 3px rgba(0, 0, 0, 0.15);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }
    .wrap { width: min(860px, 100%); }
    .top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 24px;
      border-bottom: 2px solid var(--border);
      padding-bottom: 14px;
    }
    .brand {
      display: flex; flex-direction: column; gap: 4px;
    }
    .brand h1 {
      font-size: 22px; margin: 0; font-weight: 900; text-transform: uppercase; letter-spacing: .5px;
    }
    .brand p {
      margin: 0; color: var(--muted); font-size: 13px;
    }
    .timer {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      min-width: 140px;
      text-align: right;
    }
    .timer .label { color: var(--muted); font-size: 11px; text-transform: uppercase; font-weight: 700; margin-bottom: 2px; }
    .timer .time {
      font-variant-numeric: tabular-nums;
      font-size: 20px;
      font-weight: 900;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    /* Animated screen container */
    .screen {
      padding: 24px;
      min-height: 360px;
      animation: popIn .28s ease-out;
    }
    @keyframes popIn {
      from { opacity: .0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .question-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 16px;
      align-items: flex-start;
    }
    .qtag {
      display: inline-flex;
      padding: 6px 10px;
      border-radius: var(--radius);
      background: var(--text);
      color: var(--bg);
      font-weight: 900;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .5px;
      white-space: nowrap;
      margin-bottom: 12px;
    }
    .qtitle {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
      line-height: 1.4;
    }
    .hint {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .choices {
      display: grid;
      gap: 12px;
      margin-top: 20px;
    }
    .choice {
      width: 100%;
      text-align: left;
      padding: 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border-light);
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      transition: background .1s ease, border-color .1s ease;
      outline: none;
      position: relative;
      font-size: 15px;
    }
    .choice:hover {
      border-color: var(--border);
      background: #f5f5f5;
    }
    .choice:focus-visible { box-shadow: var(--ring); border-color: var(--border); }
    .choice[aria-disabled="true"] {
      cursor: not-allowed;
      opacity: .8;
    }
    .choice .letter {
      display: inline-flex;
      width: 26px;
      height: 26px;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius);
      margin-right: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      font-weight: 900;
      font-size: 12px;
      color: var(--text);
    }
    
    /* Monochrome Answer States */
    .choice.correct {
      border: 2px solid var(--border) !important;
      background: #f0f0f0 !important;
      font-weight: 700;
    }
    .choice.wrong {
      border: 1px dashed var(--muted) !important;
      background: var(--bg) !important;
      color: var(--muted);
    }
    .choice.wrong .letter {
      border-color: var(--border-light);
      color: var(--muted);
    }

    .actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 24px;
      flex-wrap: wrap;
    }
    button {
      border: 1px solid var(--border);
      cursor: pointer;
      color: var(--accent-invert);
      background: var(--accent);
      padding: 12px 20px;
      border-radius: var(--radius);
      font-weight: 900;
      text-transform: uppercase;
      font-size: 13px;
      letter-spacing: .5px;
      transition: background .12s ease, color .12s ease;
    }
    button:hover { background: #333333; }
    button:active { background: var(--accent); }
    
    .btn-secondary {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover {
      background: #f5f5f5;
    }
    .status {
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    .end {
      display: flex;
      flex-direction: column;
      gap: 12px;
      justify-content: center;
      align-items: flex-start;
    }
    .score {
      font-size: 48px;
      font-weight: 900;
      margin: 0;
      letter-spacing: -1px;
    }
    .sub {
      color: var(--muted);
      margin: 0;
      font-size: 14px;
      line-height: 1.5;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg);
      margin-top: 12px;
    }
    .dot {
      width: 10px; height: 10px;
      background: var(--text);
    }
    .dot.bad {
      background: transparent;
      border: 2px solid var(--text);
    }

    /* Mobile adjustments */
    @media (max-width: 520px){
      .timer { min-width: 120px; padding: 6px 10px; }
      .timer .time { font-size: 18px; }
      .screen { padding: 18px; }
      .qtitle { font-size: 18px; }
      .score { font-size: 38px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="brand">
        <h1>Accountancy Quiz</h1>
        <p>Answer fast. Score updates at the end.</p>
      </div>
      <div class="timer" aria-live="polite">
        <div class="label">Time left</div>
        <div class="time" id="timerText">02:00</div>
      </div>
    </div>

    <div class="card">
      <div class="screen" id="screen">
        </div>
    </div>
  </div>

  <script type="module">
    import { questions } from './questions.js';

    const screen = document.getElementById('screen');
    const timerText = document.getElementById('timerText');

    const TOTAL_TIME_PER_Q = 120; // 2 minutes per question (seconds)

    let idx = 0;
    let score = 0;
    let selected = null;
    let locked = false;

    let remaining = TOTAL_TIME_PER_Q;
    let tick = null;

    const letters = ["A","B","C","D","E","F"];

    function fmtTime(s){
      const mm = String(Math.floor(s/60)).padStart(2,'0');
      const ss = String(s%60).padStart(2,'0');
      return `${mm}:${ss}`;
    }

    function stopTimer(){
      if(tick) clearInterval(tick);
      tick = null;
    }

    function startTimer(){
      stopTimer();
      remaining = TOTAL_TIME_PER_Q;
      timerText.textContent = fmtTime(remaining);

      tick = setInterval(() => {
        remaining -= 1;
        timerText.textContent = fmtTime(Math.max(0, remaining));
        if(remaining <= 0){
          stopTimer();
          lockAndReveal(null); // no answer
        }
      }, 1000);
    }

    function choiceTemplate(q, choiceIndex){
      const letter = letters[choiceIndex] || "?";
      const choiceText = q.choices[choiceIndex];
      return `
        <button class="choice" data-choice="${choiceIndex}" type="button" aria-disabled="false">
          <span class="letter">${letter}</span>
          <span class="ctext">${escapeHtml(choiceText)}</span>
        </button>
      `;
    }

    function escapeHtml(str){
      return String(str)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function renderQuestion(){
      const q = questions[idx];
      selected = null;
      locked = false;

      const choicesHtml = q.choices.map((_, i) => choiceTemplate(q, i)).join("");

      screen.innerHTML = `
        <div class="question-head">
          <div>
            <div class="qtag">Question ${idx+1} / ${questions.length}</div>
            <p class="qtitle">${escapeHtml(q.prompt)}</p>
            <div class="hint">${escapeHtml(q.hint ?? "")}</div>
          </div>
        </div>

        <div class="choices" role="list">
          ${choicesHtml}
        </div>

        <div class="actions">
          <div class="status">Pick one answer.</div>
          <button class="btn-secondary" id="skipBtn" type="button">Skip</button>
        </div>
      `;

      // hook up buttons
      const choiceButtons = Array.from(screen.querySelectorAll('.choice'));
      choiceButtons.forEach(btn => {
        btn.addEventListener('click', () => {
          if(locked) return;
          const c = Number(btn.getAttribute('data-choice'));
          selected = c;
          lockAndReveal(c);
        });
      });

      const skipBtn = screen.querySelector('#skipBtn');
      skipBtn.addEventListener('click', () => {
        if(locked) return;
        lockAndReveal(null);
      });

      startTimer();
    }

    function lockAndReveal(choiceIndex){
      if(locked) return;
      locked = true;
      stopTimer();

      const q = questions[idx];
      const correctIndex = q.answer;

      // Disable all choices and mark correct/wrong
      const choiceButtons = Array.from(screen.querySelectorAll('.choice'));
      choiceButtons.forEach(btn => {
        btn.setAttribute('aria-disabled', 'true');
        const ci = Number(btn.getAttribute('data-choice'));

        if(ci === correctIndex){
          btn.classList.add('correct');
        } else if(choiceIndex !== null && ci === choiceIndex){
          btn.classList.add('wrong');
        }
      });

      const isCorrect = (choiceIndex !== null && choiceIndex === correctIndex);
      if(isCorrect) score += 1;

      // show feedback + next button
      const feedback = isCorrect ? "CORRECT" : (choiceIndex === null ? "TIMEOUT / SKIPPED" : "INCORRECT");
      const explanation = q.explanation ? `<div class="hint" style="margin-top:14px; border-left: 2px solid var(--border); padding-left: 10px;">${escapeHtml(q.explanation)}</div>` : "";

      screen.insertAdjacentHTML('beforeend', `
        <div style="margin-top:20px;">
          <div class="badge">
            <span class="dot ${isCorrect ? '' : 'bad'}"></span>
            <div style="font-weight:900; font-size:12px; letter-spacing:.5px;">${feedback}</div>
          </div>
          ${explanation}
          <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:18px;">
            <button id="nextBtn" type="button">${idx+1 < questions.length ? 'Next question' : 'See results'}</button>
          </div>
        </div>
      `);

      const nextBtn = screen.querySelector('#nextBtn');
      nextBtn.addEventListener('click', () => {
        idx += 1;
        if(idx >= questions.length){
          renderEnd();
        } else {
          renderQuestion();
        }
      });
    }

    function renderEnd(){
      stopTimer();
      screen.innerHTML = `
        <div class="end">
          <div class="qtag">
            Completed
          </div>
          <p class="score">${score} / ${questions.length}</p>
          <p class="sub">
            Thanks for playing. You can refresh to try again.
          </p>
          <div class="badge">
            <span class="dot ${score >= Math.ceil(questions.length*0.7) ? '' : 'bad'}"></span>
            <div style="font-weight:900; font-size:12px; letter-spacing:.5px;">
              ${score >= Math.ceil(questions.length*0.7) ? 'GREAT JOB!' : 'GOOD EFFORT'}
            </div>
          </div>
        </div>
      `;
    }

    // Start
    renderQuestion();

  </script>
</body>
</html>
